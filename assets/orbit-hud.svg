<svg width="380" height="380" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#2979FF"/>
    </linearGradient>

    <linearGradient id="ring2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8A2BE2"/>
      <stop offset="100%" stop-color="#FF0080"/>
    </linearGradient>

    <linearGradient id="ring3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF0080"/>
      <stop offset="100%" stop-color="#00FFA3"/>
    </linearGradient>

    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#8A2BE2"/>
    </radialGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ambient background glow -->
  <circle cx="250" cy="250" r="240" fill="url(#bgGlow)"/>

  <!-- outer rotating ring -->
  <circle cx="250" cy="250" r="200" fill="none" stroke="url(#ring1)" stroke-width="1.5"
          stroke-dasharray="6 10" opacity="0.7" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate"
                       from="0 250 250" to="360 250 250" dur="22s" repeatCount="indefinite"/>
  </circle>

  <!-- middle ring, counter-rotating -->
  <circle cx="250" cy="250" r="150" fill="none" stroke="url(#ring2)" stroke-width="2"
          stroke-dasharray="3 14" opacity="0.8" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate"
                       from="360 250 250" to="0 250 250" dur="16s" repeatCount="indefinite"/>
  </circle>

  <!-- inner ring -->
  <circle cx="250" cy="250" r="100" fill="none" stroke="url(#ring3)" stroke-width="1.5"
          stroke-dasharray="10 6" opacity="0.6" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate"
                       from="0 250 250" to="360 250 250" dur="11s" repeatCount="indefinite"/>
  </circle>

  <!-- constellation of floating tech-icon nodes, orbiting together -->
  <g filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate"
                       from="0 250 250" to="360 250 250" dur="18s" repeatCount="indefinite"/>

    <g>
      <circle cx="400" cy="250" r="20" fill="#0A0A1A" stroke="#00F0FF" stroke-width="2"/>
      <text x="400" y="255" text-anchor="middle" font-family="monospace" font-size="11" fill="#00F0FF">JS</text>
    </g>
    <g>
      <circle cx="296" cy="392" r="20" fill="#0A0A1A" stroke="#8A2BE2" stroke-width="2"/>
      <text x="296" y="397" text-anchor="middle" font-family="monospace" font-size="13" fill="#8A2BE2">⚛</text>
    </g>
    <g>
      <circle cx="129" cy="338" r="20" fill="#0A0A1A" stroke="#FF0080" stroke-width="2"/>
      <text x="129" y="343" text-anchor="middle" font-family="monospace" font-size="11" fill="#FF0080">N</text>
    </g>
    <g>
      <circle cx="129" cy="162" r="20" fill="#0A0A1A" stroke="#2979FF" stroke-width="2"/>
      <text x="129" y="167" text-anchor="middle" font-family="monospace" font-size="10" fill="#2979FF">DB</text>
    </g>
    <g>
      <circle cx="296" cy="108" r="20" fill="#0A0A1A" stroke="#00FFA3" stroke-width="2"/>
      <text x="296" y="113" text-anchor="middle" font-family="monospace" font-size="10" fill="#00FFA3">git</text>
    </g>
  </g>

  <!-- pulsing core halo -->
  <circle cx="250" cy="250" r="55" fill="url(#coreGrad)" opacity="0.18" filter="url(#glow)">
    <animate attributeName="r" values="50;62;50" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- core -->
  <circle cx="250" cy="250" r="42" fill="#0A0A1A" stroke="#00F0FF" stroke-width="2" filter="url(#glow)"/>
  <text x="250" y="258" text-anchor="middle" font-family="monospace" font-size="22" fill="#00F0FF" filter="url(#glow)">&lt;/&gt;</text>
</svg>
